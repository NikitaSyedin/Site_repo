<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>


    

    <div class="container">
        <div class="row mt-5 align-items-center">
            <div class="col">
                <div class="title-heading text-center">
                    <h1 class="heading mb-4">История покорения космоса</h1>
                    <p class="para-desc text-muted col col-md-7 mx-auto ms-auto me-auto">Современные разработки, знаменитые личности и исторические байки - все это на одном сайте!</p>
                    <div class="mt-4">
                        <a href="/ussr" class="btn btn-primary bd-btn-lg mt-2 me-2"><i class="uil uil-envelope"></i> Космонавты СССР</a>
                        <a href="/usa" class="btn btn-primary bd-btn-lg mt-2 me-2"><i class="uil uil-envelope"></i> Космонавты США</a>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <div class="container">
        <div class="row no-gutters">
            <div class="col-xs-12 col-md-12 text-left">
                <p class="lead">{% block body %}{% endblock %}
                <!-- <a class="btn btn-primary btn-lg mt-3" href="/user/register">Попробовать</a> -->
            </div>
        </div>
    </div>
   



    






    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-12 mb-0 mb-md-3 pb-0 pb-md-2">
                    <p class="mt-4">Дополнительные возможности</p>
                </div><!--end col-->
                <div class="offset-lg-2 col-lg-3 col-md-3 col-12 mt-4 mt-sm-0 pt-2 pt-sm-0">
                    <ul class="list-unstyled footer-list mt-4">
                        <li><a href="/" class="text-foot"><i class="uil uil-angle-right-b me-1"></i> На главную</a></li>
                        <li><a href="/thankfulness" class="text-foot"><i class="uil uil-angle-right-b me-1"></i> Благодарности</a></li>
                    </ul>
                </div>
                <div class="col-lg-4 col-md-4 col-12 mt-4 mt-sm-0 pt-2 pt-sm-0">
                    <ul class="list-unstyled footer-list mt-4">
                        <li><a href="/about" class="text-foot"><i class="uil uil-angle-right-b me-1"></i> О нас</a></li>
                        <li><a href="mailto:niksyedin@gmail.com" class="text-foot"><i class="uil uil-angle-right-b me-1"></i> Связаться с нами</a></li>
                </div>
            </div>
        </div>
    </footer>
    
</body>
</html>
